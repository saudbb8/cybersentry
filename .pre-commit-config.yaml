repos:
  # Standard code quality hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-added-large-files
        args: ["--maxkb=500"]

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: "CyberSentry: Detect secrets"
        args: ["--baseline", ".secrets.baseline"]
        exclude: >
          (?x)^(
            tests/.*|
            .*\.example\..*|
            \.env\.example
          )$

  # Bandit SAST
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        name: "CyberSentry: SAST (bandit)"
        args: ["-ll", "--skip", "B101,B601"]  # B101=assert, B601=paramiko (adjust as needed)
        exclude: "tests/"

  # CyberSentry custom scan (requires cybersentry to be installed)
  - repo: local
    hooks:
      - id: cybersentry-secrets
        name: "CyberSentry: Secrets scan"
        entry: cybersentry scan --type secrets --quiet
        language: system
        pass_filenames: false
        always_run: true

      - id: cybersentry-deps
        name: "CyberSentry: Dependency CVE check"
        entry: cybersentry scan --type deps --quiet
        language: system
        pass_filenames: false
        stages: [push]  # Only run on push (slower)